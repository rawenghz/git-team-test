<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light px-3">
  <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5 w-100" style="max-width: 420px;">

    <!-- Header -->
    <div class="mb-4">
      <h2 class="fw-bold mb-1" style="font-size: 1.6rem;">Connexion</h2>
      <p class="text-muted mb-0" style="font-size: .9rem;">Accédez à votre espace personnel</p>
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold" style="font-size: .85rem;">Email</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
          </span>
          <input id="email" type="email" formControlName="email" placeholder="votre@email.com"
            class="form-control border-start-0 bg-light ps-0" [class.is-invalid]="isInvalid('email')" />
          @if (isInvalid('email')) {
          <div class="invalid-feedback">Email invalide</div>
          }
        </div>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label for="password" class="form-label fw-semibold" style="font-size: .85rem;">Mot de passe</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </span>
          <input id="password" [type]="showPassword() ? 'text' : 'password'" formControlName="mot_de_passe"
            placeholder="••••••••" class="form-control border-start-0 border-end-0 bg-light ps-0"
            [class.is-invalid]="isInvalid('mot_de_passe')" />
          <button type="button" class="input-group-text bg-light border-start-0 cursor-pointer"
            (click)="showPassword.update(v => !v)">
            @if (showPassword()) {
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
            } @else {
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            }
          </button>
          @if (isInvalid('mot_de_passe')) {
          <div class="invalid-feedback">Mot de passe requis</div>
          }
        </div>
      </div>

      <!-- Error banner -->
      @if (errorMsg()) {
      <div class="alert alert-danger d-flex align-items-center gap-2 py-2 px-3 mb-3" style="font-size: .85rem;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          class="flex-shrink-0">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        {{ errorMsg() }}
      </div>
      }

      <!-- Submit -->
      <button type="submit"
        class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2 fw-bold py-2 mt-2"
        [disabled]="loading()">
        @if (loading()) {
        <span class="spinner-border spinner-border-sm" role="status"></span>
        <span>Connexion...</span>
        } @else {
        <span>Se connecter</span>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12" />
          <polyline points="12 5 19 12 12 19" />
        </svg>
        }
      </button>
      <a routerLink="/"
        class="btn btn-link w-100 d-flex align-items-center justify-content-center gap-2 fw-bold py-2 mt-2">Retour à
        l'accueil</a>

    </form>
  </div>
</div>
