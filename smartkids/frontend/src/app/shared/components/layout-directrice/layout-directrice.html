<div class="d-flex min-vh-100">

  <!-- Sidebar Overlay (mobile) -->
  @if (sidebarOpen()) {
    <div
      class="d-md-none position-fixed top-0 start-0 w-100 h-100 bg-dark bg-opacity-50"
      style="z-index: 1040;"
      (click)="closeSidebar()">
    </div>
  }

  <!-- Sidebar -->
  <aside
    class="sidebar d-flex flex-column position-fixed top-0 start-0 h-100 bg-white border-end"
    [class.sidebar--open]="sidebarOpen()"
    style="z-index: 1045; width: 240px; transition: transform .3s ease;">

    <!-- Brand -->
    <div class="p-3 border-bottom">
      <div class="d-flex align-items-center gap-2">
        <div class="brand-icon d-flex align-items-center justify-content-center rounded-3 bg-primary flex-shrink-0"
             style="width:36px; height:36px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
                  stroke="white" stroke-width="1.5" fill="none"/>
          </svg>
        </div>
        <div>
          <span class="d-block fw-bold lh-sm" style="font-size:15px;">SmartKids</span>
          <span class="d-block text-muted text-uppercase"
                style="font-size:10px; letter-spacing:.6px;">Directrice</span>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-grow-1 py-2 px-2 overflow-auto">
        
        <a routerLink="dashboard" routerLinkActive="active"
        class="nav-link d-flex align-items-center gap-2 px-3 py-2 rounded-3 mb-1 text-secondary fw-semibold"
        style="font-size:14px;" (click)="closeSidebar()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        tableau de bord
        </a>
        <a routerLink="gerer-classe" routerLinkActive="active"
        class="nav-link d-flex align-items-center gap-2 px-3 py-2 rounded-3 mb-1 text-secondary fw-semibold"
        style="font-size:14px;" (click)="closeSidebar()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Gestion des Classes
        </a>
    </nav>

    <!-- Footer -->
    <div class="border-top p-3 d-flex align-items-center gap-2">
      <div class="avatar d-flex align-items-center justify-content-center rounded-circle bg-primary text-white fw-bold flex-shrink-0"
           style="width:34px; height:34px; font-size:14px;">
        {{ userInitial() }}
      </div>
      <div class="flex-grow-1 overflow-hidden">
        <span class="d-block fw-bold text-truncate" style="font-size:13px;">{{ userName() }}</span>
        <span class="d-block text-muted text-uppercase" style="font-size:10px; letter-spacing:.5px;">Directrice</span>
      </div>
      <button class="btn btn-sm btn-light d-flex align-items-center justify-content-center p-0 ms-auto flex-shrink-0"
              style="width:30px; height:30px;"
              (click)="logout()" title="Déconnexion">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content d-flex flex-column flex-grow-1 min-vh-100">

    <!-- Mobile header -->
    <header class="d-flex d-md-none align-items-center gap-3 px-3 py-2 bg-white border-bottom sticky-top">
      <button class="btn btn-sm btn-light d-flex align-items-center justify-content-center p-1"
              (click)="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="fw-bold text-primary" style="font-size:18px;">SmartKids</span>
    </header>

    <!-- Page content -->
    <div class="flex-grow-1 p-4 p-md-4" style="max-width: 1200px; width: 100%;">
      <router-outlet></router-outlet>
    </div>

  </main>
</div>
