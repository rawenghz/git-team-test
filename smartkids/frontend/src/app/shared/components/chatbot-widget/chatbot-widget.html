<!-- Floating Chat Button -->
<button id="chatbot-toggle-btn"
  class="btn chatbot-fab rounded-circle d-flex align-items-center justify-content-center shadow-lg border-0"
  [class.chatbot-fab--open]="isOpen()" (click)="toggleChat()">
  @if (!isOpen()) {
  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
  </svg>
  } @else {
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="6" x2="6" y2="18" />
    <line x1="6" y1="6" x2="18" y2="18" />
  </svg>
  }
</button>

<!-- Chat Window -->
@if (isOpen()) {
<div class="chatbot-window card shadow-lg border-0 rounded-4 overflow-hidden d-flex flex-column" id="chatbot-window">

  <!-- Header -->
  <div class="chatbot-header d-flex align-items-center justify-content-between px-3 py-3 text-white">
    <div class="d-flex align-items-center gap-2">
      <div
        class="chatbot-avatar d-flex align-items-center justify-content-center rounded-3 bg-white bg-opacity-25 flex-shrink-0"
        style="width:40px;height:40px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z" />
          <rect x="4" y="10" width="16" height="10" rx="3" />
          <circle cx="9" cy="15" r="1" fill="currentColor" />
          <circle cx="15" cy="15" r="1" fill="currentColor" />
        </svg>
      </div>
      <div>
        <div class="fw-bold" style="font-size:0.95rem;">Kidi — Assistant SmartKids</div>
        <div class="d-flex align-items-center gap-1 opacity-75" style="font-size:0.72rem;">
          <span class="chatbot-status-dot rounded-circle d-inline-block bg-success"
            style="width:7px;height:7px;"></span>
          En ligne
        </div>
      </div>
    </div>
    <button
      class="btn btn-sm text-white d-flex align-items-center justify-content-center rounded-2 p-0 chatbot-close-btn"
      style="width:32px;height:32px;" (click)="closeChat()" title="Fermer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>

  <!-- Messages -->
  <div class="chatbot-messages flex-grow-1 overflow-auto p-3 d-flex flex-column gap-3 bg-light" #messagesContainer>
    @for (msg of messages(); track msg.timestamp) {
    <div class="d-flex align-items-end gap-2 chatbot-msg-anim" [class.flex-row-reverse]="msg.role === 'user'">
      @if (msg.role === 'bot') {
      <div class="chatbot-bot-avatar rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
        style="width:28px;height:28px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z" />
          <rect x="4" y="10" width="16" height="10" rx="3" />
          <circle cx="9" cy="15" r="1" fill="currentColor" />
          <circle cx="15" cy="15" r="1" fill="currentColor" />
        </svg>
      </div>
      }
      <div class="chatbot-bubble px-3 py-2 rounded-4 shadow-sm" [class.chatbot-bubble--bot]="msg.role === 'bot'"
        [class.chatbot-bubble--user]="msg.role === 'user'" [attr.dir]="msg.direction || 'ltr'"
        [class.text-end]="msg.direction === 'rtl'"
        style="max-width:75%;font-size:0.88rem;line-height:1.55;word-break:break-word;">
        {{ msg.content }}
      </div>
    </div>
    }

    <!-- Typing indicator -->
    @if (isLoading()) {
    <div class="d-flex align-items-end gap-2 chatbot-msg-anim">
      <div class="chatbot-bot-avatar rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
        style="width:28px;height:28px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z" />
          <rect x="4" y="10" width="16" height="10" rx="3" />
          <circle cx="9" cy="15" r="1" fill="currentColor" />
          <circle cx="15" cy="15" r="1" fill="currentColor" />
        </svg>
      </div>
      <div class="chatbot-bubble chatbot-bubble--bot d-flex align-items-center gap-1 px-3 py-2 rounded-4 shadow-sm">
        <span class="chatbot-dot rounded-circle d-inline-block"></span>
        <span class="chatbot-dot rounded-circle d-inline-block"></span>
        <span class="chatbot-dot rounded-circle d-inline-block"></span>
      </div>
    </div>
    }
  </div>

  <!-- Input -->
  <div class="d-flex align-items-center gap-2 p-3 border-top bg-white">
    <input id="chatbot-input" type="text" class="form-control rounded-3 border" placeholder="Écrivez votre message... "
      [(ngModel)]="userInput" (keydown)="onKeyDown($event)" [disabled]="isLoading()" autocomplete="off" dir="auto" />
    <button id="chatbot-send-btn"
      class="btn btn-primary rounded-3 d-flex align-items-center justify-content-center flex-shrink-0 chatbot-send-btn"
      style="width:40px;height:40px;" (click)="sendMessage()" [disabled]="!userInput.trim() || isLoading()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13" />
        <polygon points="22 2 15 22 11 13 2 9 22 2" />
      </svg>
    </button>
  </div>

</div>
}
